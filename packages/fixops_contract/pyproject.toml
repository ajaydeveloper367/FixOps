[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fixops-contract"
version = "0.1.0"
description = "Shared types and thin transport helpers for FixOps"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.6",
  "httpx>=0.27",
]

[tool.setuptools.packages.find]
where = ["src"]
