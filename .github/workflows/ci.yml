name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"
      - name: Install (project .venv via uv)
        run: uv sync
      - name: Pytest
        run: uv run pytest -q
