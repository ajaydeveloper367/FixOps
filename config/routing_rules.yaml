version: 1
default_worker_id: worker-obs
rules:
  - match:
      alert_class: HighErrorRate
    worker_id: worker-obs
  - match:
      alert_class: PipelineFailure
    worker_id: worker-pipeline
  - match:
      alert_class: DatabaseLatency
    worker_id: worker-db
  - match:
      alert_class: AppRegression
    worker_id: worker-app-rca
  - match:
      alert_class: AdHocQuery
    worker_id: worker-k8s
  - match:
      entity_type: service
    worker_id: worker-obs
  - match:
      alert_class: QuerySynthetic
    worker_id: worker-obs
