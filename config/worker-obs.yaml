# Observability worker only — deploy independently; no controller keys here.
# Override path: FIXOPS_WORKER_OBS_CONFIG=/absolute/path/to/worker-obs.yaml
# Env vars FIXOPS_WORKER_* still override these keys when set.

version: 1

# Prometheus HTTP API (JSON). Same host as the UI, but path must be /api/v1/query — /query is the HTML UI only.
prometheus_base_url: "http://localhost:6060"
prometheus_query_path: "/api/v1/query"
# Loki HTTP API (query endpoint).
loki_base_url: "http://localhost:6061"
loki_query_path: "/loki/api/v1/query"
# Grafana API (health / dashboards). Credentials optional for public endpoints.
