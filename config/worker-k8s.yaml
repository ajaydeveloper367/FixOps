# Kubernetes worker only — deploy independently; controller passes cluster_id / refs only.
# Override path: FIXOPS_WORKER_K8S_CONFIG=/absolute/path/to/worker-k8s.yaml
# Env vars FIXOPS_WORKER_K8S_* still override these keys when set.

version: 1
credentials_backend: local_map
# Supported credential backends:
# - local_map: resolve from `clusters` (cluster_id) then `credential_refs` (credentials_ref key)
# - env_json: resolve from JSON map in env var FIXOPS_WORKER_K8S_CREDENTIALS_JSON
# - file_json: resolve from JSON map file path in credentials_file
# credentials_file: "/etc/fixops/worker-k8s-credentials.json"
default_cluster_id: local

# Local credentials map by cluster_id. Worker resolves this map internally.
clusters:
  local:
    kubeconfig_path: "~/.kube/config"
    # context: "kind-kind"

# Optional references map when controller sends credentials_ref (refs only).
# credential_refs:
#   "ref:dev-eks":
#     kubeconfig_path: "~/.kube/dev-eks-config"
